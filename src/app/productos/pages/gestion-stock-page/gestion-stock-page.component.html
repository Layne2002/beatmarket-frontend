<div class="gestion-stock-grid">
  <div class="deseados-col">
    <mat-card>
      <mat-card-title>Álbumes deseados por los usuarios</mat-card-title>
      <div class="acciones-restock">
        <button mat-raised-button color="accent" (click)="restockDeseados()">
          Restock todos los deseados
        </button>
        <button mat-raised-button color="warn" (click)="restockTopAlbums()">
          Restock Top 10 artistas más escuchados
        </button>
      </div>
      <mat-card-content>
        <table mat-table [dataSource]="deseados" class="mat-elevation-z2" *ngIf="deseados.length > 0">
          <ng-container matColumnDef="album">
            <th mat-header-cell *matHeaderCellDef> Álbum </th>
            <td mat-cell *matCellDef="let d"> {{ d.album }} </td>
          </ng-container>

          <ng-container matColumnDef="artista">
            <th mat-header-cell *matHeaderCellDef> Artista </th>
            <td mat-cell *matCellDef="let d"> {{ d.artista }} </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef> Acción </th>
            <td mat-cell *matCellDef="let d">
              <button mat-button color="primary" (click)="anyadirAlCatalogo(d)">Añadir al catálogo</button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="columnas"></tr>
          <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
        </table>
        <p *ngIf="deseados?.length === 0">No hay álbumes deseados pendientes.</p>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="stock-bajo-col">
    <mat-card>
      <mat-card-title>Productos con bajo stock</mat-card-title>
      <div class="acciones-restock">
        <button mat-raised-button color="accent" (click)="aumentarStockTodos()">
          Aumentar stock de todos a 50
        </button>
      </div>
      <mat-card-content>
        <table mat-table [dataSource]="productosBajoStock" class="mat-elevation-z2" *ngIf="productosBajoStock.length > 0">
          <ng-container matColumnDef="titulo">
            <th mat-header-cell *matHeaderCellDef style="color:white;"> Álbum </th>
            <td mat-cell *matCellDef="let p" style="color:white;"> {{ p.tituloAlbum }} </td>
          </ng-container>

          <ng-container matColumnDef="autor">
            <th mat-header-cell *matHeaderCellDef style="color:white;"> Autor </th>
            <td mat-cell *matCellDef="let p" style="color:white;"> {{ p.autor }} </td>
          </ng-container>

          <ng-container matColumnDef="stock">
            <th mat-header-cell *matHeaderCellDef style="color:white;"> Stock </th>
            <td mat-cell *matCellDef="let p" style="color:white;"> {{ p.stock }} </td>
          </ng-container>
              <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef> Acción </th>
            <td mat-cell *matCellDef="let p">
              <button mat-button color="primary" (click)="aumentarStock50(p)">Aumentar stock a 50</button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="['titulo', 'autor', 'stock', 'acciones']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['titulo', 'autor', 'stock', 'acciones']"></tr>
        </table>
        <p *ngIf="productosBajoStock.length === 0">Todos los productos tienen stock suficiente.</p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
