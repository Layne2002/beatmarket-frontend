<div class="gestion-pedidos-container">
  <h2>Gestión de Pedidos</h2>

  <mat-form-field appearance="outline" style="width: 300px; margin-bottom: 1rem;">
    <mat-label>Buscar por email</mat-label>
    <input matInput [(ngModel)]="searchText" (input)="filtrarPedidos()" placeholder="Introduce un email">
    <button *ngIf="searchText" matSuffix mat-icon-button aria-label="Clear" (click)="limpiarFiltro()">
      <mat-icon>close</mat-icon>
    </button>
  </mat-form-field>

  <table mat-table [dataSource]="filteredPedidos" class="mat-elevation-z8" *ngIf="filteredPedidos.length > 0">
    <ng-container matColumnDef="usuarioId">
      <th mat-header-cell *matHeaderCellDef>Usuario</th>
      <td mat-cell *matCellDef="let pedido">{{ pedido.usuario.email }}</td>
    </ng-container>

    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef>Total</th>
      <td mat-cell *matCellDef="let pedido">{{ pedido.total }} €</td>
    </ng-container>

    <ng-container matColumnDef="fecha">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let pedido">{{ pedido.fecha | date:'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let pedido">{{ pedido.estado }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let pedido">
        <button mat-button (click)="editPedido(pedido)">Ver detalles</button>
        <button mat-button color="warn" (click)="confirmarCancelacion(pedido)">Eliminar</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['usuarioId', 'total', 'fecha', 'estado', 'acciones']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['usuarioId', 'total', 'fecha', 'estado', 'acciones'];"></tr>
  </table>

  <p *ngIf="filteredPedidos?.length === 0">No hay pedidos registrados.</p>
</div>
